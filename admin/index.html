<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Content Manager</title>
</head>
<body>
  <script src="https://unpkg.com/decap-cms@^3.0.0/dist/decap-cms.js"></script>
  <script>
    // ── Preview styles ───────────────────────────────────────────────────────
    // Inject the built site CSS into the CMS preview iframe so the docs preview
    // matches the published theme. style.css is the theme's pre-built Tailwind
    // (incl. .prose typography); served at <base>/docs/style.css on the site.
    //
    // Derive the base path from the admin URL at runtime — an absolute "/docs/.."
    // 404s on a GitHub *project* page served under /<repo>/, and a bare relative
    // path is unreliable inside the preview iframe. e.g. /<repo>/admin/ → /<repo>/
    var SITE_BASE = location.pathname.replace(/admin\/.*$/, '');
    CMS.registerPreviewStyle(SITE_BASE + 'docs/style.css');
    CMS.registerPreviewStyle(SITE_BASE + 'showcase.css');

    // ── Live preview for documentation pages ────────────────────────────────
    // The theme styles are scoped to "#docs-root" and ".prose" (see theme/
    // main.html), so mirror that wrapper here or the markdown renders unstyled.
    var DocsPreview = createClass({
      render: function () {
        return h(
          'div',
          { id: 'docs-root' },
          h(
            'main',
            { id: 'content' },
            h(
              'article',
              { className: 'prose prose-gray max-w-none', style: { padding: '1.5rem' } },
              this.props.widgetFor('body')
            )
          )
        );
      }
    });

    CMS.registerPreviewTemplate('docs', DocsPreview);

    // ── Live preview for the showcase page ──────────────────────────────────
    var ShowcasePreview = createClass({
      render: function () {
        var content = this.props.entry.getIn(['data', 'content']) || '';
        return h('div', { dangerouslySetInnerHTML: { __html: content } });
      }
    });

    CMS.registerPreviewTemplate('showcase', ShowcasePreview);
  </script>
</body>
</html>
